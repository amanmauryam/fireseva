{% extends "admin/admin_base.html" %}

{% block content %}
<h1>Bulk Business Import</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <p><strong>State</strong></p>
    <select name="state" id="state">
        <option value="">Select State</option>
        {% for state in states %}
        <option value="{{ state.id }}">{{ state.name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <p><strong>City</strong></p>
    <select name="city" id="city">
        <option value="">Select City</option>
    </select>

    <br><br>

    <p><strong>Category</strong></p>
    <select name="category">
        <option value="">Select Category</option>
        {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <p><strong>Excel File</strong></p>
    <input type="file" name="excel">

    <br><br>

    <button type="submit">Import</button>
</form>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const stateDropdown = document.getElementById("state");
        const cityDropdown = document.getElementById("city");

        stateDropdown.addEventListener("change", function () {
            const stateId = this.value;

            if (!stateId) {
                cityDropdown.innerHTML = '<option value="">Select City</option>';
                return;
            }

            cityDropdown.innerHTML = '<option value="">Loading...</option>';

            fetch(`/ajax/cities/?state_id=${stateId}`)
                .then(response => {
                    if (!response.ok) throw new Error("Network error");
                    return response.json();
                })
                .then(data => {
                    cityDropdown.innerHTML = '<option value="">Select City</option>';
                    data.forEach(city => {
                        cityDropdown.innerHTML += `<option value="${city.id}">${city.name}</option>`;
                    });
                })
                .catch(() => {
                    cityDropdown.innerHTML = '<option value="">Failed to load cities</option>';
                });
        });
    });
</script>
{% endblock content %}

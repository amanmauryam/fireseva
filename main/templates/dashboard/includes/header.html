<header class="fixed top-0 right-0 left-0 lg:left-64 h-16 bg-white/80 backdrop-blur-xl border-b border-gray-200 z-30">
    <div class="h-full flex items-center px-4 sm:px-6 lg:px-8">
        <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 rounded-xl hover:bg-gray-100 transition text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <div class="sm:ml-4">
            <h1 class="text-base sm:text-lg font-bold text-gray-900 leading-tight">{% block page_title %}Dashboard{% endblock %}</h1>
            <p class="text-xs text-gray-400 leading-tight">{% block page_subtitle %}{% endblock %}</p>
        </div>
    </div>
</header>

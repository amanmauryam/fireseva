{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>429 Too Many Requests - Fireseva</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex flex-col">

    <main class="flex-1 flex items-center justify-center px-4">
        <div class="text-center max-w-lg">
            <p class="text-8xl sm:text-9xl font-black text-[#A20513] select-none">429</p>
            <h1 class="text-2xl sm:text-3xl font-bold mt-2 text-gray-900">Too Many Requests</h1>
            <p class="text-gray-600 mt-3 leading-relaxed">
                You're moving too fast! Please wait a moment and try again.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-3 mt-8">
                <a href="/" class="px-8 py-3 bg-[#A20513] hover:bg-rose-700 text-white font-semibold rounded-xl transition text-sm sm:text-base">
                    Go Home
                </a>
                <button onclick="history.back()" class="px-8 py-3 border-2 border-gray-300 text-gray-700 font-semibold rounded-xl hover:border-gray-400 transition text-sm sm:text-base">
                    Go Back
                </button>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-gray-400">
        &copy; {% now "Y" %} Fireseva. All rights reserved.
    </footer>

</body>
</html>
